<style>
        .progress-bar-container {
            width: 100%;
            height: 2px;
            background-color: #E5E5E2;
            position: relative;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: #000000;
            width: 0%;
            animation: progress 90s linear forwards;
        }

        .step-label {
            opacity: 0;
            position: absolute;
            transform: translateY(10px);
            transition: all 0.3s ease-out;
        }
        
        .step-label.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        .step-label.exit {
            opacity: 0;
            transform: translateY(-10px);
        }

        @keyframes progress {
            0% { width: 0%; }
            20% { width: 15%; }
            40% { width: 45%; }
            60% { width: 60%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 16px;
            background-color: #000000;
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }
    </style>

<body class="bg-background text-on-surface h-screen flex flex-col overflow-hidden selection:bg-surface-variant selection:text-primary">
<!-- Top Navigation (Shell suppressed due to transitional state intent, but minimal header retained for branding) -->

<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 18px;">close</span>

</header>

<span class="step-label" data-step="1">Pulling funding history...</span>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const labels = document.querySelectorAll('.step-label');
    const totalTime = 90000; // 90 seconds timeout max
    const numSteps = labels.length;
    const timePerStep = totalTime / numSteps;
    
    let currentStep = 0;
    let isFinished = false;

    const updateLabels = () => {
        if (isFinished || currentStep >= numSteps) return;

        labels.forEach((label, index) => {
            if (index === currentStep) {
                label.classList.add('active');
                label.classList.remove('exit');
            } else if (index < currentStep) {
                label.classList.remove('active');
                label.classList.add('exit');
            } else {
                label.classList.remove('active', 'exit');
            }
        });
        
        currentStep++;
        if (currentStep < numSteps) {
            setTimeout(updateLabels, 8000 / numSteps); // Rotate faster than 90s for visuals
        }
    };
    setTimeout(updateLabels, 500);

    const progressBar = document.getElementById('progress-bar');
    const percentageText = document.getElementById('progress-percentage');
    let startTime = null;
    
    const updatePercentage = (timestamp) => {
        if (isFinished) return;
        if (!startTime) startTime = timestamp;
        const elapsed = timestamp - startTime;
        
        // Progress goes up to 99% over 90 seconds
        const progress = Math.min(elapsed / 90000, 0.99);
        
        let displayPercentage = Math.floor(progress * 100);
        percentageText.textContent = `${displayPercentage}%`;
        
        // Fix css animation to match 90s
        progressBar.style.animationDuration = '90s';

        if (progress < 1) {
            requestAnimationFrame(updatePercentage);
        }
    };
    requestAnimationFrame(updatePercentage);

    // Update Company Name
    const query = sessionStorage.getItem('searchQuery') || 'Unknown Entity';
    const h1 = document.querySelector('h1');
    h1.innerHTML = `${query}<span class="cursor-blink"></span>`;

    // API Call
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 90000);

        fetch('http://localhost:8000/api/v1/research/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ company_name: query }),
        signal: controller.signal
    })
    .then(res => {
        if (!res.ok) throw new Error('Network error or server unavailable');
        return res.json();
    })
    .then(data => {
        clearTimeout(timeoutId);
        isFinished = true;
        percentageText.textContent = '100%';
        progressBar.style.width = '100%';
        progressBar.style.animation = 'none';
        
        const activeLabel = document.querySelector('.step-label.active');
        if(activeLabel) activeLabel.textContent = "Research complete. Redirecting...";
        
        sessionStorage.setItem('researchResult', JSON.stringify(data));
        
        try {
            let history = JSON.parse(localStorage.getItem('orionHistory') || '[]');
            history = history.filter(item => item.company_name !== data.company_name);
            history.unshift(data);
            if (history.length > 10) history.pop();
            localStorage.setItem('orionHistory', JSON.stringify(history));
        } catch (e) {
            console.error("Could not save to history", e);
        }

        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 500);
    })
    .catch(err => {
        clearTimeout(timeoutId);
        isFinished = true;
        progressBar.style.animationPlayState = 'paused';
        percentageText.textContent = 'ERR';
        percentageText.classList.add('text-error');
        percentageText.style.color = '#ba1a1a';
        
        const labelsContainer = document.getElementById('status-labels');
        labelsContainer.innerHTML = `<span class="step-label active" style="opacity: 1; transform: translateY(0); color: #ba1a1a;">Error: ${err.name === 'AbortError' ? 'Request timed out' : err.message}</span>`;
    });
});
</script>
