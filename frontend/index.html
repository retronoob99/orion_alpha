<style>
        body {
            background-color: #F9F9F8;
            color: #1a1c1c;
        }
        /* Custom focused input style to override default tailwind forms ring */
        input:focus {
            outline: none;
            box-shadow: none;
            border-color: #000000;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-background text-on-background selection:bg-surface-variant selection:text-primary">
<main class="w-full max-w-[640px] px-margin-md flex flex-col items-center text-center">
<div class="mb-margin-lg">
<h1 class="font-display text-display text-primary mb-2">Orion Alpha</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Pre-seed investment research terminal.</p>
</div>
<div class="w-full relative">
<form action="#" class="w-full" method="GET">
<input autocomplete="off" autofocus="" class="w-full bg-surface-container-lowest border border-outline-variant font-body-lg text-body-lg text-primary placeholder:text-outline p-4 rounded-none transition-colors duration-200 focus:border-primary focus:ring-0" name="q" placeholder="Enter a company name or URL" type="text"/>
</form>
<div class="mt-4 flex flex-wrap justify-center gap-2" id="recent-container">
<span class="font-label-md text-label-md text-on-surface-variant bg-surface-container-low border border-outline-variant px-2 py-1 uppercase tracking-wider">Recent:</span>
<!-- dynamically populated from localStorage -->
</div>
</div>
</main>
<footer class="absolute bottom-margin-md w-full text-center">
<p class="font-mono-data text-mono-data text-outline-variant">System Status: Nominal | Terminal v2.4.1</p>
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const form = document.querySelector('form');
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const query = document.querySelector('input[name="q"]').value.trim();
        if (query) {
            sessionStorage.setItem('searchQuery', query);
            window.location.href = 'loading.html';
        }
    });
    const recentContainer = document.getElementById('recent-container');
    try {
        const history = JSON.parse(localStorage.getItem('orionHistory') || '[]');
        if (history.length > 0) {
            recentContainer.innerHTML = '<span class="font-label-md text-label-md text-on-surface-variant bg-surface-container-low border border-outline-variant px-2 py-1 uppercase tracking-wider">Recent:</span>';
            history.forEach(item => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'font-label-md text-label-md text-primary bg-surface-container-lowest border border-outline-variant px-2 py-1 uppercase hover:bg-surface-container-low transition-colors';
                btn.textContent = item.company_name || 'Unknown';
                btn.addEventListener('click', () => {
                    sessionStorage.setItem('researchResult', JSON.stringify(item));
                    window.location.href = 'dashboard.html';
                });
                recentContainer.appendChild(btn);
            });
        }
    } catch (e) {
        console.error("Error loading history", e);
    }
});
</script>
</body>
</html>
